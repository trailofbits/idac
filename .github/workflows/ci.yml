name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Lint
        run: make lint

  test:
    name: Test (IDA ${{ matrix.ida-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - ida-version: "9.3"
            ida-installer: release/9.3/ida-pro/ida-pro_93_x64linux.run
          - ida-version: "9.4"
            ida-installer: release/9.4/ida-pro/ida-pro_94_x64linux.run
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install IDA Pro
        id: ida
        uses: HexRaysSA/ida-hcli-actions/install-ida@2ff7f4e7c466809cfae6ea20c81264bdb6a33d49 # v1.1.0
        with:
          installer-id: ${{ matrix.ida-installer }}
          license-id: ${{ secrets.IDA_LICENSE_ID }}
          api-key: ${{ secrets.HCLI_API_KEY }}
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"

      - name: Test
        run: make test

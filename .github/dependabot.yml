version: 2

updates:
  - package-ecosystem: uv
    allow:
      - dependency-type: all
    cooldown:
      default-days: 7
    directory: /
    groups:
      python:
        patterns:
          - "*"
    schedule:
      interval: monthly

  - package-ecosystem: github-actions
    cooldown:
      default-days: 7
    directory: /
    groups:
      actions:
        patterns:
          - "*"
    schedule:
      interval: monthly
